name: CharityAI — 500-Test Android Appium E2E Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  android-e2e:
    runs-on: ubuntu-latest # Bypasses macOS queue restrictions, starts instantly

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: e2e-tests/package.json

      - name: Install Test Suite Dependencies
        run: |
          cd e2e-tests
          npm install

      - name: Run E2E Test Suite
        run: |
          cd e2e-tests
          npm test

      - name: Upload Test Reports as Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: charityai-e2e-reports
          path: |
            e2e-tests/reports/test-report.xlsx
            e2e-tests/reports/execution-report.html
